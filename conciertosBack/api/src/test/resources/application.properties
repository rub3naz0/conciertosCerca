spring.datasource.url=jdbc:sqlite::memory:
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.connection-init-sql=PRAGMA foreign_keys=ON
scraper.base-url=http://localhost:8080
scraper.rate-limit-ms=0
scraper.chunk-months=1
scraper.reports-dir=build/test-reports
app.admin.username=test-admin
app.admin.password=test-pass
